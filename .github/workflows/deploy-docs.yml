name: Deploy Documentation

# Builds the Starlight docs site + the Doxygen C++ API reference and
# publishes them to GitHub Pages at https://branes-ai.github.io/cortex/.
#
# One-time setup (repo admin, cannot be automated here): Settings → Pages →
# Build and deployment → Source = "GitHub Actions". After that, every push
# to main touching docs-site/ (or this workflow) redeploys.

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - 'math/include/**'
      - 'sdk/include/**'
      - 'cv/include/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends doxygen

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Generate C++ API reference (Doxygen)
        working-directory: docs-site
        run: npm run api

      - name: Build site (Astro)
        working-directory: docs-site
        run: npm run build
        env:
          DEPLOY_TARGET: github-pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs-site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
