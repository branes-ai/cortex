name: Cortex CI

on: [push, pull_request]

# Top-level least-privilege default. Per-job overrides only when a job
# genuinely needs more.
permissions:
  contents: read

env:
  # GitHub Actions cache backend for sccache. Caches both rustc objects
  # (via RUSTC_WRAPPER) and clang/gcc objects (via the CMake launcher
  # variables we set in each preset).
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  CMAKE_C_COMPILER_LAUNCHER: "sccache"
  CMAKE_CXX_COMPILER_LAUNCHER: "sccache"

jobs:
  lint:
    name: Lint (clippy + cargo fmt + clang-format)
    # Use 24.04 to get a recent clang-format (18.x) that supports the
    # IncludeBlocks/Regroup options we configure in .clang-format.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master @ 2026-05-23
        with:
          toolchain: 1.83.0
          components: rustfmt, clippy
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Run sccache-action
        # Needed because the workflow-level RUSTC_WRAPPER=sccache would
        # otherwise fail clippy on a fresh runner without sccache.
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696  # v0.0.10
      - name: cargo fmt --check
        working-directory: core
        run: cargo fmt --all -- --check
      - name: cargo clippy
        working-directory: core
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: clang-format --dry-run on tracked C/C++ sources
        run: |
          set -e
          files=$(git ls-files '*.cpp' '*.hpp' '*.h' '*.cc' '*.cxx' '*.hxx')
          if [ -z "$files" ]; then
            echo "No C/C++ source files tracked — skipping clang-format."
            exit 0
          fi
          echo "Checking $(echo "$files" | wc -l) files."
          echo "$files" | xargs clang-format --dry-run --Werror

  build-and-test-sitl:
    name: Build and Test (SITL - x86)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        # rust-toolchain.toml at the repo root pins the channel + targets.
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master @ 2026-05-23
        with:
          toolchain: 1.83.0
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build build-essential
      - name: Run sccache-action
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696  # v0.0.10
      - name: Configure
        run: cmake --preset sitl-debug
      - name: Build
        run: cmake --build --preset sitl-debug
      - name: Run C++ Unit Tests (Math & Emulation)
        run: ctest --preset sitl-debug
      - name: sccache stats
        if: always()
        run: sccache --show-stats

  # One job per config (Release + Debug) over a preset matrix. Release matches
  # the Corrosion-built Rust CRT; Debug additionally guards the Rust-core link
  # the Visual Studio IDE hits by default — without the project-wide /MD CRT pin
  # it fails LNK2038/LNK1319 (C++ /MDd clashing the always-/MD Rust staticlib),
  # which the Release job can't catch.
  build-and-test-windows:
    name: Build and Test (Windows - MSVC ${{ matrix.label }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - { preset: msvc-ninja,       label: Release }
          - { preset: msvc-ninja-debug, label: Debug }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        # rust-toolchain.toml pins the channel; on Windows this resolves the
        # x86_64-pc-windows-msvc host toolchain that Corrosion builds with.
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master @ 2026-05-23
        with:
          toolchain: 1.83.0
      - name: Set up the MSVC environment (vcvars x64)
        # The Ninja generator — unlike the Visual Studio generator — does not
        # locate the toolchain itself: it needs cl.exe on PATH and INCLUDE/LIB
        # set. msvc-dev-cmd runs vcvars64 and exports the environment for the
        # steps below.
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1.13.0
        with:
          arch: x64
      - name: Run sccache-action
        # Caches both rustc (RUSTC_WRAPPER) and cl.exe (CMAKE_<LANG>_COMPILER_
        # LAUNCHER) objects via the workflow-level env. Effective here because
        # the Ninja generator honors the compiler launcher (the VS generator
        # does not) and the preset emits /Z7 instead of /Zi, so a shared PDB no
        # longer defeats the cache.
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696  # v0.0.10
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
      - name: Run C++ Unit Tests (Math & Emulation)
        run: ctest --preset ${{ matrix.preset }}
      - name: sccache stats
        if: always()
        run: sccache --show-stats

  coverage:
    name: Coverage (cargo-llvm-cov, gated >= 85%)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Install Rust toolchain (with llvm-tools)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master @ 2026-05-23
        with:
          toolchain: 1.83.0
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@6c1f7cf125e42770ff087ea443901b487cc5471a  # v2
        with:
          tool: cargo-llvm-cov
      - name: Run sccache-action
        # Workflow-level RUSTC_WRAPPER=sccache requires sccache installed.
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696  # v0.0.10
      - name: Coverage (core/) — generate lcov + print summary + gate
        working-directory: core
        # Phase 1 (#19) flips on --fail-under-lines 85. The bar is set to
        # the lowest credible floor that the current test suite clears
        # comfortably; tighten over time as test coverage grows.
        run: |
          # First pass: generate lcov + run tests, no gate yet so we
          # always reach the summary print.
          cargo llvm-cov --workspace --all-features --no-report
          cargo llvm-cov report --lcov --output-path coverage.lcov
          echo ""
          echo "=== Coverage summary ==="
          cargo llvm-cov report --summary-only
          echo ""
          echo "=== Enforcing line-coverage floor (>= 85%) ==="
          cargo llvm-cov report --fail-under-lines 85
      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-lcov
          path: core/coverage.lcov
          retention-days: 14

  build-kpu-cross:
    name: Cross-Compile (KPU Target - aarch64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master @ 2026-05-23
        with:
          toolchain: 1.83.0
          targets: aarch64-unknown-linux-gnu
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      - name: Run sccache-action
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696  # v0.0.10
      - name: Configure
        run: cmake --preset kpu-cross
      - name: Build
        run: cmake --build --preset kpu-cross
      - name: Verify aarch64 artifact
        run: aarch64-linux-gnu-objdump -f build/kpu-cross/libcortex_core.a | head -20
      - name: sccache stats
        if: always()
        run: sccache --show-stats
