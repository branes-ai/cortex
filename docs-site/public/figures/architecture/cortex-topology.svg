<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Cortex runtime topology: Host Broker + Thin Client</title>
  <desc id="desc">Unprivileged thin-client daemons talk over a UDS + POSIX shared-memory IPC channel to the single privileged Resource Manager (Rust) broker, which dispatches domain-flow programs to the KPU spatial dataflow fabric.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- ===== Thin clients (top row) ===== -->
  <text x="648" y="30" text-anchor="end" font-size="12" fill="currentColor" opacity="0.7" font-style="italic">unprivileged thin clients</text>

  <!-- client 1 -->
  <rect x="72" y="40" width="168" height="60" rx="8" fill="#3b82f6" fill-opacity="0.10" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="156" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="currentColor">vio_daemon</text>
  <text x="156" y="86" text-anchor="middle" font-size="11.5" fill="currentColor" opacity="0.7">thin client</text>

  <!-- client 2 -->
  <rect x="276" y="40" width="168" height="60" rx="8" fill="#3b82f6" fill-opacity="0.10" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="360" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="currentColor">slam_daemon</text>
  <text x="360" y="86" text-anchor="middle" font-size="11.5" fill="currentColor" opacity="0.7">thin client</text>

  <!-- client 3 -->
  <rect x="480" y="40" width="168" height="60" rx="8" fill="#3b82f6" fill-opacity="0.10" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="564" y="68" text-anchor="middle" font-size="16" font-weight="600" fill="currentColor">…</text>
  <text x="564" y="86" text-anchor="middle" font-size="11.5" fill="currentColor" opacity="0.7">more thin clients</text>

  <!-- ===== IPC connectors down to broker ===== -->
  <g stroke="currentColor" stroke-width="1.4" fill="none" color="currentColor">
    <line x1="156" y1="100" x2="156" y2="198" marker-end="url(#arrow)"/>
    <line x1="360" y1="100" x2="360" y2="198" marker-end="url(#arrow)"/>
    <line x1="564" y1="100" x2="564" y2="198" marker-end="url(#arrow)"/>
  </g>

  <!-- IPC label (drawn last, sits on top of the middle connector) -->
  <rect x="248" y="138" width="224" height="22" rx="6" fill="currentColor" fill-opacity="0.07"/>
  <text x="360" y="153" text-anchor="middle" font-size="12" fill="currentColor">UDS + POSIX shm IPC · request / replay</text>

  <!-- ===== Resource Manager (the one broker) ===== -->
  <rect x="72" y="200" width="576" height="116" rx="8" fill="#f59e0b" fill-opacity="0.10" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="360" y="232" text-anchor="middle" font-size="15.5" font-weight="700" fill="currentColor">Resource Manager  (core/, Rust)</text>
  <text x="360" y="256" text-anchor="middle" font-size="12.5" fill="currentColor" opacity="0.85">the single privileged broker — owns /dev/kpu</text>
  <text x="360" y="280" text-anchor="middle" font-size="11.5" fill="currentColor" opacity="0.7">tile + memory allocation map · conflict detection</text>
  <text x="360" y="299" text-anchor="middle" font-size="11.5" fill="currentColor" opacity="0.7">release-on-completion</text>

  <!-- ===== Broker -> KPU ===== -->
  <line x1="360" y1="316" x2="360" y2="398" stroke="currentColor" stroke-width="1.4" fill="none" color="currentColor" marker-end="url(#arrow)"/>
  <text x="372" y="362" text-anchor="start" font-size="12" fill="currentColor" opacity="0.85">domain flow programs</text>

  <!-- ===== KPU fabric ===== -->
  <rect x="270" y="400" width="180" height="74" rx="8" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="1.8"/>
  <text x="360" y="432" text-anchor="middle" font-size="15.5" font-weight="700" fill="currentColor">KPU</text>
  <text x="360" y="454" text-anchor="middle" font-size="11.5" fill="currentColor" opacity="0.75">spatial dataflow fabric</text>

  <!-- ===== Legend ===== -->
  <rect x="72" y="498" width="576" height="86" rx="8" fill="currentColor" fill-opacity="0.04" stroke="currentColor" stroke-opacity="0.35" stroke-width="1"/>
  <text x="86" y="518" font-size="11" font-weight="700" fill="currentColor" opacity="0.6" letter-spacing="0.5">LEGEND</text>

  <text x="86" y="538" font-size="12" fill="currentColor"><tspan font-weight="700">UDS</tspan><tspan opacity="0.85">  Unix Domain Socket — same-host IPC via a filesystem socket;</tspan></text>
  <text x="116" y="554" font-size="12" fill="currentColor" opacity="0.85">carries control / request messages, and passes shm handles between processes.</text>
  <text x="86" y="574" font-size="12" fill="currentColor"><tspan font-weight="700">shm</tspan><tspan opacity="0.85">  POSIX shared memory — a zero-copy region holding the bulk payload data.</tspan></text>
</svg>
