<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 940" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">VIO pipeline S0 to S10 stage flow</title>
  <desc id="desc">The OpenVINS-style MSCKF pipeline as eleven staged contracts. A one-shot S1 initialization seeds the per-frame MSCKF cycle (S2 IMU propagation, S3 state augmentation, S4 visual frontend, S5 triangulation, S6 update, S9 marginalization), which loops every camera frame. S0 sensor and calibration models are the substrate every stage trusts. S7, S8 and S10 are optional layers. Colour encodes the measured #212 verdict: green stages are measured-consistent, amber stages are open input-side over-confidence candidates (S1 initial covariance, S0/S10 unmodeled calibration).</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="currentColor">VIO pipeline — S0 → S10 stage flow</text>
  <text x="410" y="50" text-anchor="middle" font-size="11.5" fill="currentColor" opacity="0.7">OpenVINS-style MSCKF · each stage is a measured contract (docs/arch/vio-pipeline-canonical.md)</text>

  <!-- ===== Inputs ===== -->
  <rect x="243" y="66" width="140" height="28" rx="14" fill="currentColor" fill-opacity="0.06" stroke="currentColor" stroke-opacity="0.4" stroke-width="1"/>
  <text x="313" y="84" text-anchor="middle" font-size="11.5" fill="currentColor">IMU stream</text>
  <rect x="437" y="66" width="140" height="28" rx="14" fill="currentColor" fill-opacity="0.06" stroke="currentColor" stroke-opacity="0.4" stroke-width="1"/>
  <text x="507" y="84" text-anchor="middle" font-size="11.5" fill="currentColor">Camera frames</text>
  <g stroke="currentColor" stroke-width="1.4" fill="none" color="currentColor">
    <line x1="313" y1="94" x2="392" y2="114" marker-end="url(#arrow)"/>
    <line x1="507" y1="94" x2="428" y2="114" marker-end="url(#arrow)"/>
  </g>

  <!-- ===== S1 Initialization (one-shot) ===== -->
  <rect x="250" y="116" width="300" height="52" rx="8" fill="#f59e0b" fill-opacity="0.10" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="400" y="139" text-anchor="middle" font-size="13" font-weight="600" fill="currentColor">S1 · Initialization  (one-shot bootstrap)</text>
  <text x="400" y="157" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.78">R_GI, biases, scale, P₀  ·  yaw/scale σ open</text>
  <line x1="400" y1="168" x2="400" y2="194" stroke="currentColor" stroke-width="1.4" fill="none" color="currentColor" marker-end="url(#arrow)"/>

  <!-- ===== Per-frame cycle container ===== -->
  <rect x="200" y="196" width="400" height="540" rx="12" fill="currentColor" fill-opacity="0.03" stroke="currentColor" stroke-opacity="0.28" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="400" y="214" text-anchor="middle" font-size="11" font-style="italic" fill="currentColor" opacity="0.6">per-frame MSCKF cycle  ↻</text>

  <!-- ===== Core stage boxes ===== -->
  <!-- S2 -->
  <rect x="250" y="228" width="300" height="56" rx="8" fill="#10b981" fill-opacity="0.10" stroke="#10b981" stroke-width="1.8"/>
  <text x="400" y="251" text-anchor="middle" font-size="13" font-weight="600" fill="currentColor">S2 · IMU propagation</text>
  <text x="400" y="270" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.78">mean + covariance → (x⁻, P⁻)</text>
  <line x1="400" y1="284" x2="400" y2="310" stroke="currentColor" stroke-width="1.4" fill="none" color="currentColor" marker-end="url(#arrow)"/>

  <!-- S3 -->
  <rect x="250" y="312" width="300" height="56" rx="8" fill="#10b981" fill-opacity="0.10" stroke="#10b981" stroke-width="1.8"/>
  <text x="400" y="335" text-anchor="middle" font-size="13" font-weight="600" fill="currentColor">S3 · State augmentation</text>
  <text x="400" y="354" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.78">stochastic clone of the camera pose</text>
  <line x1="400" y1="368" x2="400" y2="394" stroke="currentColor" stroke-width="1.4" fill="none" color="currentColor" marker-end="url(#arrow)"/>

  <!-- S4 -->
  <rect x="250" y="396" width="300" height="56" rx="8" fill="#3b82f6" fill-opacity="0.10" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="400" y="419" text-anchor="middle" font-size="13" font-weight="600" fill="currentColor">S4 · Visual frontend</text>
  <text x="400" y="438" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.78">KLT tracks · outlier gate (default-off)</text>
  <line x1="400" y1="452" x2="400" y2="478" stroke="currentColor" stroke-width="1.4" fill="none" color="currentColor" marker-end="url(#arrow)"/>

  <!-- S5 -->
  <rect x="250" y="480" width="300" height="56" rx="8" fill="#10b981" fill-opacity="0.10" stroke="#10b981" stroke-width="1.8"/>
  <text x="400" y="503" text-anchor="middle" font-size="13" font-weight="600" fill="currentColor">S5 · Feature triangulation</text>
  <text x="400" y="522" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.78">bearings → p_f  (DLT + Gauss-Newton)</text>
  <line x1="400" y1="536" x2="400" y2="558" stroke="currentColor" stroke-width="1.4" fill="none" color="currentColor" marker-end="url(#arrow)"/>

  <!-- S6 (consistency-critical) -->
  <rect x="250" y="560" width="300" height="64" rx="8" fill="#10b981" fill-opacity="0.14" stroke="#10b981" stroke-width="2.6"/>
  <text x="400" y="578" text-anchor="middle" font-size="8.5" font-weight="700" fill="#10b981" letter-spacing="0.4">★ CONSISTENCY-CRITICAL</text>
  <text x="400" y="596" text-anchor="middle" font-size="13" font-weight="700" fill="currentColor">S6 · MSCKF update</text>
  <text x="400" y="613" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.82">null-space · QR · χ² gate · EKF (Joseph) · NIS/dof ≈ 1</text>
  <line x1="400" y1="624" x2="400" y2="646" stroke="currentColor" stroke-width="1.4" fill="none" color="currentColor" marker-end="url(#arrow)"/>

  <!-- S9 -->
  <rect x="250" y="648" width="300" height="56" rx="8" fill="#10b981" fill-opacity="0.10" stroke="#10b981" stroke-width="1.8"/>
  <text x="400" y="671" text-anchor="middle" font-size="13" font-weight="600" fill="currentColor">S9 · Marginalization</text>
  <text x="400" y="690" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.78">slide the clone window (oldest out)</text>

  <!-- ===== Loop-back arrow (left) ===== -->
  <path d="M 250 676 L 168 676 L 168 256 L 250 256" fill="none" stroke="currentColor" stroke-width="1.6" color="currentColor" marker-end="url(#arrow)"/>
  <text x="160" y="466" text-anchor="middle" font-size="10.5" fill="currentColor" opacity="0.75" transform="rotate(-90 160 466)">next camera frame  ↻</text>

  <!-- ===== Optional layers (right) ===== -->
  <text x="706" y="222" text-anchor="middle" font-size="10.5" font-style="italic" fill="currentColor" opacity="0.6">optional layers</text>
  <!-- connectors -->
  <g stroke="currentColor" stroke-width="1.3" stroke-dasharray="4 3" fill="none" color="currentColor" opacity="0.55">
    <line x1="600" y1="256" x2="618" y2="256"/>
    <line x1="600" y1="565" x2="618" y2="565"/>
    <line x1="600" y1="624" x2="618" y2="630"/>
  </g>
  <!-- S8 -->
  <rect x="618" y="232" width="178" height="50" rx="8" fill="#94a3b8" fill-opacity="0.10" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="707" y="253" text-anchor="middle" font-size="12" font-weight="600" fill="currentColor">S8 · Zero-velocity</text>
  <text x="707" y="270" text-anchor="middle" font-size="9.5" fill="currentColor" opacity="0.75">optional · robustness</text>
  <!-- S7 -->
  <rect x="618" y="540" width="178" height="50" rx="8" fill="#94a3b8" fill-opacity="0.10" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="707" y="561" text-anchor="middle" font-size="12" font-weight="600" fill="currentColor">S7 · SLAM features</text>
  <text x="707" y="578" text-anchor="middle" font-size="9.5" fill="currentColor" opacity="0.75">optional · in-state landmarks</text>
  <!-- S10 (amber lead) -->
  <rect x="618" y="606" width="178" height="56" rx="8" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="2"/>
  <text x="707" y="627" text-anchor="middle" font-size="12" font-weight="700" fill="currentColor">S10 · Online calibration</text>
  <text x="707" y="644" text-anchor="middle" font-size="9.5" fill="currentColor" opacity="0.82">T_CI / t_d / intrinsics</text>
  <text x="707" y="657" text-anchor="middle" font-size="9.5" font-weight="700" fill="#f59e0b">#212 LEAD — unmodeled uncertainty</text>

  <!-- ===== S0 substrate ===== -->
  <text x="400" y="752" text-anchor="middle" font-size="9.5" fill="currentColor" opacity="0.6">▲ trusted by every stage above</text>
  <rect x="120" y="758" width="576" height="58" rx="10" fill="#10b981" fill-opacity="0.07" stroke="#10b981" stroke-width="1.8"/>
  <text x="408" y="782" text-anchor="middle" font-size="13" font-weight="700" fill="currentColor">S0 · Sensor &amp; calibration models — the substrate</text>
  <text x="408" y="801" text-anchor="middle" font-size="9.5" fill="currentColor" opacity="0.8">project/unproject · IMU model · T_CI · t_d  —  projection holds; calibration uncertainty unmodeled (#212)</text>

  <!-- ===== Legend ===== -->
  <rect x="120" y="832" width="580" height="86" rx="8" fill="currentColor" fill-opacity="0.04" stroke="currentColor" stroke-opacity="0.3" stroke-width="1"/>
  <text x="134" y="852" font-size="10.5" font-weight="700" fill="currentColor" opacity="0.6" letter-spacing="0.5">VERDICT (measured)</text>

  <rect x="134" y="862" width="16" height="12" rx="2" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
  <text x="158" y="872" font-size="11" fill="currentColor">measured-consistent (contract holds)</text>
  <rect x="420" y="862" width="16" height="12" rx="2" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="444" y="872" font-size="11" fill="currentColor">open #212 candidate (input-side)</text>

  <rect x="134" y="888" width="16" height="12" rx="2" fill="#3b82f6" fill-opacity="0.2" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="158" y="898" font-size="11" fill="currentColor">core path, in progress</text>
  <rect x="420" y="888" width="16" height="12" rx="2" fill="#94a3b8" fill-opacity="0.2" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="444" y="898" font-size="11" fill="currentColor">optional layer</text>
</svg>
